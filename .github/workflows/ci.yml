name: CI

on:
  push:
    branches: [main, 'phase*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
