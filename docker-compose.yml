services:
  superagent:
    build: .
    container_name: super-agent-platform
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - superagent_data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  superagent_data:
    driver: local
